[pytest]
# Directorio base de los archivos .feature (relativo a este archivo)
bdd_features_base_dir = features

# Dónde están los tests
testpaths = step_defs

# Opciones por defecto:
#   -v                      → verbose (nombre de cada test)
#   --tb=short              → traceback corto en fallos
#   --html                  → genera reporte HTML en reports/report.html
#   --self-contained-html   → todo en un solo archivo (imágenes embebidas en base64)
addopts = -v --tb=short --html=reports/report.html --self-contained-html

# Marcas disponibles
markers =
    publico: Tests de vistas públicas (sin login)
    admin: Tests del panel de administración (requiere login admin)
    auth: Tests de autenticación
